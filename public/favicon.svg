<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Rent Standard">
  <defs>
    <!-- Closer to UI logo: deep blue → teal -->
    <linearGradient id="rs-grad" x1="16" y1="16" x2="112" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f3fad" />
      <stop offset="1" stop-color="#0b7e63" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="10" y="10" width="108" height="108" rx="28" fill="url(#rs-grad)" />

  <!-- Shield outline: proportion + shape tuned for favicon size -->
  <path
    d="M64 30
       L90 38
       V62
       C90 78 80 92 64 98
       C48 92 38 78 38 62
       V38
       Z"
    fill="none"
    stroke="#ffffff"
    stroke-width="6.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
</svg>
