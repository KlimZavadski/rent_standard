# Deploy landing page to GitHub Pages
# After first run: repo Settings → Pages → Source: "GitHub Actions"

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build
        run: |
          npm install
          npm run build -- --base=/${{ github.event.repository.name }}/
          cp dist/index.html dist/404.html
        env:
          VITE_PUBLIC_SITE_ORIGIN: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          VITE_LEADS_ENDPOINT: ${{ secrets.VITE_LEADS_ENDPOINT }}
          VITE_USE_SMARTLOOK: ${{ secrets.VITE_USE_SMARTLOOK }}
          VITE_SMARTLOOK_KEY: ${{ secrets.VITE_SMARTLOOK_KEY }}
          VITE_SMARTLOOK_REGION: ${{ secrets.VITE_SMARTLOOK_REGION }}
          VITE_USE_GA: ${{ secrets.VITE_USE_GA }}
          VITE_GA_MEASUREMENT_ID: ${{ secrets.VITE_GA_MEASUREMENT_ID }}

      - name: Serve built site for testing
        run: |
          REPO="${{ github.event.repository.name }}"
          mkdir -p serve-dir/"$REPO"
          cp -r dist/* serve-dir/"$REPO"/
          npx serve serve-dir -l 4173 &
          npx wait-on "http://localhost:4173/$REPO/" -t 10000

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright (page opens, no runtime errors)
        run: PLAYWRIGHT_BASE_URL=http://localhost:4173/${{ github.event.repository.name }}/ npx playwright test
        env:
          CI: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
